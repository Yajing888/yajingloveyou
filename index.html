<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱你💗</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffd1dc);
      position: relative;
    }

    .container {
      text-align: center;
      z-index: 2;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      animation: floatCard 3s ease-in-out infinite;
    }

    h1 {
      font-size: 64px;
      color: #ff2e63;
      margin-bottom: 16px;
      animation: pulse 1.8s infinite;
    }

    p {
      font-size: 24px;
      color: #444;
      margin-bottom: 24px;
    }

    button {
      padding: 14px 28px;
      font-size: 20px;
      border: none;
      border-radius: 999px;
      background: #ff4f81;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 18px rgba(255, 79, 129, 0.35);
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 24px rgba(255, 79, 129, 0.45);
    }

    #message {
      margin-top: 22px;
      font-size: 28px;
      color: #d81b60;
      min-height: 40px;
      font-weight: bold;
    }

    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 24px;
      animation: rise linear forwards;
      opacity: 0.85;
      user-select: none;
      pointer-events: none;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-110vh) scale(1.8);
        opacity: 0;
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @keyframes floatCard {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>爱你💋</h1>
    <p>点一下按钮，看看我想对你说什么</p>
    <button onclick="showLove()">点我一下</button>
    <div id="message"></div>
  </div>

  <script>
    const messages = [
      "比昨天更爱你一点 💗",
      "今天也还是超级喜欢你 ✨",
      "你出现的时候，世界都变可爱了 🌸",
      "我的心动永远偏向你 💞",
      "爱你这件事我每天都在认真做 💌"
    ];

    function showLove() {
      const randomIndex = Math.floor(Math.random() * messages.length);
      document.getElementById("message").textContent = messages[randomIndex];
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = ["💗", "💖", "💘", "💕", "💞"][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 20 + "px";
      heart.style.animationDuration = Math.random() * 3 + 4 + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 300);
  </script>
</body>
</html>
