<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱你💗</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5);
      font-family: Arial;
      overflow: hidden;
    }

    .card {
      text-align: center;
      background: rgba(255,255,255,0.4);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    img {
      width: 220px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    h1 {
      color: #ff2e63;
      font-size: 40px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 999px;
      background: #ff4f81;
      color: white;
      cursor: pointer;
    }

    #message {
      margin-top: 15px;
      font-size: 22px;
      color: #d81b60;
    }

    .heart {
      position: absolute;
      bottom: -10px;
      font-size: 20px;
      animation: rise 5s linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <!-- 🎵 背景音乐 -->
  <audio id="bgm" src="love.mp3" loop></audio>

  <div class="card">
    <!-- 📸 照片 -->
    <img src="PHOTO.JPG" alt="我们的照片" />

    <h1>爱你💋</h1>

    <button onclick="startLove()">点我一下</button>

    <div id="message"></div>
  </div>

  <script>
    const messages = [
      "今天也比昨天更爱你 💗",
      "你出现的时候世界都变甜了 🍓",
      "虽然你有点呆有点憨 💞",
      "但是很可爱 每天都想你 💘"
    ];

    function startLove() {
      // 播放音乐（必须点击触发）
      document.getElementById("bgm").play();

      // 显示情话
      const i = Math.floor(Math.random() * messages.length);
      document.getElementById("message").textContent = messages[i];
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
